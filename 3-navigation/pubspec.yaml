name: navigation_tutorial
description: "A News Reader app teaching Flutter routing: Navigator, GoRouter, and auto_route."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # --- Localization (l10n) ---
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # --- Functional programming ---
  dartz: ^0.10.1

  # --- Code generation annotations ---
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # --- Navigation packages ---
  # go_router: declarative routing with deep link support
  go_router: ^14.0.0
  # auto_route: code-generated routing with type-safe arguments
  auto_route: ^9.0.0

  # --- UI ---
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # --- Code generation ---
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  auto_route_generator: ^9.0.0

flutter:
  generate: true
  uses-material-design: true
