# =============================================================================
# Localization Configuration
# =============================================================================
# This file tells Flutter's gen-l10n tool where to find ARB files and
# what to generate. Run `flutter gen-l10n` or just `flutter pub get`.
#
# Key settings:
# - arb-dir: folder containing .arb translation files
# - template-arb-file: the "source of truth" locale
# - output-localization-file: the generated Dart file you import
# - output-dir: where the generated Dart files go

arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
output-dir: lib/l10n/generated
