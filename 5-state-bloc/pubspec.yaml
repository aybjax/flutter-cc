name: state_bloc_tutorial
description: "Product Catalog app demonstrating full BLoC pattern with search, filtering, favorites, and cart."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  intl: ^0.20.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  flutter_bloc: ^8.1.6
  hydrated_bloc: ^9.0.0
  bloc_concurrency: ^0.2.0
  http: ^1.4.0
  path_provider: ^2.1.0
  stream_transform: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  bloc_test: ^9.0.0

flutter:
  generate: true
  uses-material-design: true
