# =============================================================================
# GitHub Actions — CD Pipeline
# Purpose: Builds and deploys the app when a release tag is pushed.
#          Uses Fastlane for building and deployment.
# =============================================================================

name: CD

on:
  push:
    tags:
      - "v*"  # Triggered by tags like v1.0.0, v2.1.3, etc.

  # Alternative: trigger on release creation
  # release:
  #   types: [published]

# ---------------------------------------------------------------------------
# Environment
# ---------------------------------------------------------------------------
env:
  FLUTTER_VERSION: "3.27.0"

jobs:
  # ---------------------------------------------------------------------------
  # Build and Deploy Android
  # ---------------------------------------------------------------------------
  deploy-android:
    name: Deploy Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: android

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      # Decode the Play Store service account key from a GitHub secret
      # - name: Decode Play Store credentials
      #   run: echo "${{ secrets.GOOGLE_PLAY_JSON_KEY }}" | base64 --decode > android/google-play-key.json

      - name: Build production App Bundle via Fastlane
        working-directory: android
        run: bundle exec fastlane build_prod

      # - name: Deploy to Play Store via Fastlane
      #   working-directory: android
      #   run: bundle exec fastlane deploy_play_store

      # Alternative: upload artifact instead of deploying
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/bundle/productionRelease/*.aab

  # ---------------------------------------------------------------------------
  # Build and Deploy iOS
  # ---------------------------------------------------------------------------
  deploy-ios:
    name: Deploy iOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      # Set up code signing from secrets
      # - name: Set up match certificates
      #   working-directory: ios
      #   env:
      #     MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      #     MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      #   run: bundle exec fastlane sync_signing

      - name: Build production IPA via Fastlane
        working-directory: ios
        run: bundle exec fastlane build_prod

      # - name: Deploy to TestFlight via Fastlane
      #   working-directory: ios
      #   env:
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
      #   run: bundle exec fastlane deploy_testflight

      # Alternative: upload artifact instead of deploying
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/ipa/*.ipa
