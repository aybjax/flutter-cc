name: aybkaz
description: "1x1 video/audio calling app with chat built on clean feature architecture."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  auto_route: ^10.0.1
  dartz: ^0.10.1
  dio: ^5.9.2
  flutter_bloc: ^9.1.0
  flutter_contacts: ^1.1.9+2
  flutter_webrtc: ^1.3.0
  freezed_annotation: ^3.0.0
  get_it: ^8.0.3
  intl: ^0.20.2
  json_annotation: ^4.11.0
  shared_preferences: ^2.5.4
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  auto_route_generator: ^10.0.1
  build_runner: ^2.5.4
  freezed: ^3.0.6
  json_serializable: ^6.9.5

flutter:
  generate: true
  uses-material-design: true
